name: Prosemirror 中文翻译

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # 每周日的午夜

# Note: 同一时间只允许一个翻译任务运行，避免手动触发与定时任务重叠时
# 两个 job 同时向 main 强推打架。cancel-in-progress: false 表示排队而非取消，
# 不会中断正在进行的翻译/推送。
concurrency:
  group: prosemirror-translate
  cancel-in-progress: false

jobs:
  Build_and_Publish:
    runs-on: ubuntu-latest

    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v3
        with:
          ref: main
          persist-credentials: true

      - name: 设置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 设置 Git
        run: |
          git config --global user.name 'Xheldon[bot]'
          git config --global user.email 'c1006044256@gmail.com'

      - name: 检出 Prosemirror/website 仓库
        run: |
          # 上游已于 2026-04-01 将 GitHub 仓库 archive（冻结只读），迁移至 Forgejo 平台
          # 旧地址 https://github.com/ProseMirror/website.git 不再更新
          # 参考文档由 npm 上的 prosemirror-* 模块源码生成，不需要 website 的历史，
          # 用 --depth 1 浅克隆加速。
          git clone --depth 1 https://code.haverbeke.berlin/prosemirror/website.git

      - name: 检查是否有更新
        id: check_commits
        run: |
          cd website
          NEW_COMMIT=$(git rev-parse HEAD)
          cd ..
          if [ -f last-commit.txt ]; then
            OLD_COMMIT=$(cat last-commit.txt)
          else
            OLD_COMMIT=""
          fi
          echo "new_commit=$NEW_COMMIT" >> $GITHUB_ENV
          echo "old_commit=$OLD_COMMIT" >> $GITHUB_ENV
          if [[ "$NEW_COMMIT" != "$OLD_COMMIT" ]]; then
            echo "每周检查发现新的提交"
            echo "new_commits=true" >> $GITHUB_ENV
            # Note: last-commit.txt 不在此处推进，改为在"推送"步骤中仅当本次翻译无错误时才写入。
            # 这样如果翻译中途出错（如接口临时不可用），last-commit.txt 保持旧值，
            # 下次定时检查会再次判定"有更新"从而自动重试，避免漏翻。
          else
            if [[ ${{ github.event_name }} == 'workflow_dispatch' ]]; then
              echo "手动触发更新"
              echo "new_commits=true" >> $GITHUB_ENV
            else
              echo "没有新的提交。"
              echo "new_commits=false" >> $GITHUB_ENV
            fi
          fi

      - name: 安装依赖
        if: env.new_commits == 'true'
        run: |
          cd website
          npm install
          cat ../append-head.html >> templates/head.html
          make

      - name: 构建中文翻译
        if: env.new_commits == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_URL: ${{ secrets.OPENAI_URL }}
        run: |
          # Note: 根目录翻译脚本依赖用 npm ci（有 lock 文件，可复现）；
          # website 的依赖仍用 npm install，以便按 ^ 版本范围拉取 npm 上最新的
          # prosemirror-* 模块，从而生成最新的接口文档。
          npm ci
          # Note: 清空上一次可能遗留在仓库里的错误记录，确保 error.txt 只反映本次运行
          rm -f error.txt
          node index.js

      - name: 推送到 gp 分支
        if: env.new_commits == 'true'
        run: |
          git checkout -b temp
          rm -rf public
          mkdir -p public && cp -R website/public/* public
          # Note: 上游 2026-07-02 加入了屏蔽各家 AI 爬虫的 robots.txt，这里删除它，
          # 不让中文翻译站跟着屏蔽（Googlebot 未被屏蔽，不影响普通搜索收录）。
          rm -f public/robots.txt
          # Note: 仅当本次翻译无错误时才推进 last-commit.txt，出错则保持旧值以便下次重试
          if [ ! -s error.txt ]; then
            echo "$new_commit" > last-commit.txt
          fi
          git add .
          if [ -s "error.txt" ]; then
            git commit -m "本次翻译存在错误[bot]"
          else
            git commit -m "更新文档[bot]"
          fi
          git push -f https://Xheldon:${{ secrets.GIT_TOKEN }}@github.com/${{ github.repository }} temp:main

      - name: 检查是否存在错误
        if: env.new_commits == 'true'
        run: |
          if [ -s "error.txt" ]; then
            echo "本次翻译存在错误，已保留原文并未推进 last-commit.txt，下次运行会自动重试"
            exit 1
          fi
